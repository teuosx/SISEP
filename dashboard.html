<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            background-color: #add8e6;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .dashboard-container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 300px;
            text-align: center;
            margin-top: 20px;
        }
        .dashboard-container h1 {
            color: #333333;
            margin-bottom: 20px;
        }
        .dashboard-container #welcome-message {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .dashboard-container a {
            display: block;
            margin-top: 10px;
            text-decoration: none;
            background-color: #007bff;
            color: #ffffff;
            padding: 10px;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        .dashboard-container a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>Bem-vindo ao Dashboard</h1>
        <p id="welcome-message"></p>
        <a href="step1.html">Criar novo aluno</a>
        <a href="novo_adm.html">Alterar informações do administrador</a>
        <a href="ver_alunos.php">Ver alunos cadastrados</a>
        <a href="ranquear_alunos.php">Ranquear alunos por cota e média</a>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const nome = urlParams.get('nome');

            document.getElementById("welcome-message").innerText = "Olá, " + nome + "!";
        }
    </script>
</body>
</html>
