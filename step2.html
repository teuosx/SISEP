<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Etapa 2</title>
    <style>
        body {
            background-color: #f0f8ff; /* LightSkyBlue */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .cadastro-container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 300px;
        }
        .cadastro-container h2 {
            margin-top: 0;
            text-align: center;
            color: #333333;
        }
        .cadastro-form {
            margin-top: 20px;
        }
        .cadastro-form label {
            display: block;
            margin-bottom: 5px;
            color: #555555;
        }
        .cadastro-form input[type="text"],
        .cadastro-form input[type="email"],
        .cadastro-form select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #dddddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .cadastro-form input[type="checkbox"] {
            margin-bottom: 15px;
        }
        .cadastro-form input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #007bff; /* Primary color */
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .cadastro-form input[type="submit"]:hover {
            background-color: #0056b3; /* Darker primary color */
        }
    </style>
</head>
<body>
    <div class="cadastro-container">
        <h2>Cadastro - Etapa 2</h2>
        <form class="cadastro-form" action="step2.php" method="POST">
            <!-- Campos para a segunda etapa do cadastro -->
            <label for="estado">Estado:</label>
            <input type="text" id="estado" name="estado" required maxlength="50"><br>
            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" name="cidade" required maxlength="50"><br>
            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" name="bairro" required maxlength="50"><br>
            <label for="rua">Rua:</label>
            <input type="text" id="rua" name="rua" required maxlength="100"><br>
            <label for="numero">Número:</label>
            <input type="text" id="numero" name="numero" required maxlength="10"><br>
            <label for="complemento">Complemento:</label>
            <input type="text" id="complemento" name="complemento" maxlength="100"><br>
            <label for="comprovante_residencia">Comprovante de Residência:</label>
            <input type="checkbox" id="comprovante_residencia" name="comprovante_residencia"><br>
            <input type="submit" value="Próximo">
        </form>
    </div>
</body>
</html>
