<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Etapa 5</title>
    <style>
        body {
            background-color: #f0f8ff; /* LightSkyBlue */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .cadastro-container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px; /* Reduzido o padding */
            width: 400px; /* Reduzido a largura */
            display: flex;
            flex-direction: column; /* Organizado em coluna */
            align-items: center; /* Centralizado horizontalmente */
        }
        .cadastro-form {
            width: 100%; /* Definindo a largura de cada formulário para 100% */
            margin-bottom: 20px; /* Adiciona espaço entre os formulários */
        }
        .cadastro-form h3 {
            margin-top: 0;
            text-align: center;
            color: #333333;
        }
        .cadastro-form label {
            display: block;
            margin-bottom: 5px;
            color: #555555;
        }
        .cadastro-form input[type="number"] {
            width: calc(100% - 22px); /* Alterado para permitir a largura do botão de spin */
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #dddddd; /* Primary color */
            border-radius: 4px;
            box-sizing: border-box;
        }
        .cadastro-form input[type="number"]::-webkit-inner-spin-button,
        .cadastro-form input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #enviar-button {
            width: 100%; /* Largura igual ao formulário */
            padding: 10px;
            background-color: #007bff; /* Primary color */
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #enviar-button:hover {
            background-color: #0056b3; /* Darker primary color */
        }
    </style>
</head>
<body>
    <div class="cadastro-container">
        <form class="cadastro-form" action="step4.php" method="POST">
            <h3>Matemática</h3>
            <label for="nota_matematica_sexto">Nota do 6º Ano:</label>
            <input type="number" id="nota_matematica_sexto" name="nota_matematica_sexto" required min="0" max="10" step="0.01"><br>
            <label for="nota_matematica_setimo">Nota do 7º Ano:</label>
            <input type="number" id="nota_matematica_setimo" name="nota_matematica_setimo" required min="0" max="10" step="0.01"><br>
            <label for="nota_matematica_oitavo">Nota do 8º Ano:</label>
            <input type="number" id="nota_matematica_oitavo" name="nota_matematica_oitavo" required min="0" max="10" step="0.01"><br>
            <label for="nota_matematica_nonobim1">Nota do 1º Bimestre do 9º Ano:</label>
            <input type="number" id="nota_matematica_nonobim1" name="nota_matematica_nonobim1" required min="0" max="10" step="0.01"><br>
            <label for="nota_matematica_nonobim2">Nota do 2º Bimestre do 9º Ano:</label>
            <input type="number" id="nota_matematica_nonobim2" name="nota_matematica_nonobim2" required min="0" max="10" step="0.01"><br>
            <label for="nota_matematica_nonobim3">Nota do 3º Bimestre do 9º Ano:</label>
            <input type="number" id="nota_matematica_nonobim3" name="nota_matematica_nonobim3" required min="0" max="10" step="0.01"><br>
            <label for="nota_matematica_nonobim4">Nota do 4º Bimestre do 9º Ano:</label>
            <input type="number" id="nota_matematica_nonobim4" name="nota_matematica_nonobim4" min="0" max="10" step="0.01"><br>
        </form>
        <button id="enviar-button" type="submit">Enviar</button>
    </div>
</body>
</html>
