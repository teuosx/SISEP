<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Etapa 4</title>
    <style>
        body {
            background-color: #f0f8ff; /* LightSkyBlue */
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .cadastro-container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 300px;
        }
        .cadastro-container h2 {
            margin-top: 0;
            text-align: center;
            color: #333333;
        }
        .cadastro-form {
            margin-top: 20px;
        }
        .cadastro-form label {
            display: block;
            margin-bottom: 5px;
            color: #555555;
        }
        .cadastro-form select {
            width: calc(100% - 22px); /* Considerando a largura do padding (10px em cada lado) e da borda (1px em cada lado) */
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #dddddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .cadastro-form input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #007bff; /* Primary color */
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .cadastro-form input[type="submit"]:hover {
            background-color: #0056b3; /* Darker primary color */
        }
    </style>
</head>
<body>
    <div class="cadastro-container">
        <h2>Cadastro - Etapa 4</h2>
        <form class="cadastro-form" action="step5.php" method="POST">
            <label for="cotas">Cotas:</label>
            <select id="cotas" name="cotas">
                <option value="Deficiente">Deficiente</option>
                <option value="Escola Privada">Escola Privada</option>
                <option value="Localidade">Localidade</option>
                <option value="Ampla Concorrência">Ampla Concorrência</option>
            </select><br>
            <input type="submit" value="Cadastrar">
        </form>
    </div>
</body>
</html>
